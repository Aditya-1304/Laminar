services:
  postgres:
    image: postgres:16
    container_name: laminar-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laminar_backend
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: laminar-redis
    ports:
      - "6380:6379"
